services:
  wisave-incomes-webapi:
    build:
      context: .
      dockerfile: Dockerfile.WebApi
      secrets:
        - nuget_config
    depends_on:
      wisave-incomes-postgres:
        condition: service_healthy
    networks:
      - default
      - wisave-net
    environment:
      - ConnectionStrings__General=Host=wisave-incomes-postgres;Database=wisave.incomes.general;Username=wisave;Password=wisave_dev
      - ConnectionStrings__Projections=Host=wisave-incomes-postgres;Database=wisave.incomes.projections;Username=wisave;Password=wisave_dev
      - RabbitMq__Host=rabbitmq
      - RabbitMq__VirtualHost=incomes
      - RabbitMq__Username=guest
      - RabbitMq__Password=guest

  worker-domain:
    build:
      context: .
      dockerfile: Dockerfile.Worker.Domain
      secrets:
        - nuget_config
    depends_on:
      wisave-incomes-postgres:
        condition: service_healthy
    environment:
      - ConnectionStrings__General=Host=wisave-incomes-postgres;Database=wisave.incomes.general;Username=wisave;Password=wisave_dev
      - ConnectionStrings__EventStore=Host=wisave-incomes-postgres;Database=wisave.incomes.eventstore;Username=wisave;Password=wisave_dev
      - RabbitMq__Host=rabbitmq
      - RabbitMq__VirtualHost=incomes
      - RabbitMq__Username=guest
      - RabbitMq__Password=guest
    networks:
      - default
      - wisave-net

  worker-projections:
    build:
      context: .
      dockerfile: Dockerfile.Worker.Projections
      secrets:
        - nuget_config
    depends_on:
      wisave-incomes-postgres:
        condition: service_healthy
    environment:
      - ConnectionStrings__General=Host=wisave-incomes-postgres;Database=wisave.incomes.general;Username=wisave;Password=wisave_dev
      - ConnectionStrings__Projections=Host=wisave-incomes-postgres;Database=wisave.incomes.projections;Username=wisave;Password=wisave_dev
      - RabbitMq__Host=rabbitmq
      - RabbitMq__VirtualHost=incomes
      - RabbitMq__Username=guest
      - RabbitMq__Password=guest
    networks:
      - default
      - wisave-net

  wisave-incomes-postgres:
    image: postgres:17
    ports:
      - "5438:5432"
    environment:
      - POSTGRES_DB=postgres
      - POSTGRES_USER=wisave
      - POSTGRES_PASSWORD=wisave_dev
    volumes:
      - incomes-postgres-db:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wisave -d 'wisave.incomes.general' && pg_isready -U wisave -d 'wisave.incomes.eventstore' && pg_isready -U wisave -d 'wisave.incomes.projections'"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  incomes-postgres-db:

networks:
  default:
  wisave-net:
    external: true
    name: wisave-net

secrets:
  nuget_config:
    file: ${HOME}/.nuget/NuGet/NuGet.Config
