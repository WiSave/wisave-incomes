name: Publish Contracts Preview NuGet

on:
  pull_request:
    branches: [master]
    paths:
      - 'src/WiSave.Incomes.Contracts/**'
      - '.github/workflows/publish-contracts.yml'
      - '.github/workflows/pr-contracts-preview.yml'
      - 'version.json'

env:
  DOTNET_VERSION: '10.0.x'
  PACKAGE_PROJECT: src/WiSave.Incomes.Contracts/WiSave.Incomes.Contracts.csproj

jobs:
  publish-preview:
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore ${{ env.PACKAGE_PROJECT }}

      - name: Build
        run: dotnet build ${{ env.PACKAGE_PROJECT }} -c Release --no-restore

      - name: Pack
        run: dotnet pack ${{ env.PACKAGE_PROJECT }} -c Release --no-build -o ./nupkg

      - name: Push preview package to GitHub Packages
        run: dotnet nuget push ./nupkg/*.nupkg --source "https://nuget.pkg.github.com/WiSave/index.json" --api-key ${{ secrets.GITHUB_TOKEN }} --skip-duplicate
